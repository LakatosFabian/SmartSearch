<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
</head>
<body>
    <div class="recipe-finder-container">
        <h1>Recipe Finder</h1>

        <div class="message" id="message-area">Search for baking recipes by name or ingredients</div>


        <form id="search-form" class="search-box">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search by name or ingredients">
                <ul id="autocomplete-list"></ul>
            </div>

            <button type="submit" id="search-button">Search</button>
        </form>

        <div class="results-grid" id="results-grid"></div>

    </div>
    <script src="main.js"></script>
</body>
</html>
